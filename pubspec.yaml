name: osm_search_and_pick
description: A flutter place search and location picker plugin that uses Open Street Map.
version: 0.2.1
homepage: https://github.com/mrmhthegreat/osm_search_and_pick.git

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_map: ^8.2.2
  geolocator: ^14.0.2
  http: ^1.6.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
